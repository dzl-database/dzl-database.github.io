<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ドズル社非公式マップ</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
body{
  margin:0;

  background:
    radial-gradient(circle at 10% 20%, rgba(181,0,18,0.06), transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(181,0,18,0.05), transparent 40%),
    linear-gradient(135deg, #f4f6f9 0%, #e9edf3 100%);

  font-family: sans-serif;
}

.site-title img{
  height:55px;
  cursor:pointer;
}

@media(max-width:768px){
  .site-title img{
    height:50px;
  }
}

/* ===== セクション ===== */
.section{
  display:none;
  height:calc(100vh - 60px);
}

.section.active{
  display:block;
}

/* ===== マップ ===== */
.map iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ===== テキスト系 ===== */
.content{
  padding:20px;
}

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:#fff;
  border-radius:12px;
  padding:20px;
  width:280px;
  text-align:center;
}

.menu-link{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#f0f0f0;
  border-radius:8px;
  cursor:pointer;
}

/* ===== ヘッダー（ホームと統一） ===== */
.main-header{
  position:fixed;
  top:0;
  width:100%;
  background:#d90000;
  color:white;
  z-index:1000;
  height:64px;
}

.header-top{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:18px;
}

.site-icon{
  width:28px;
  height:28px;
  object-fit:contain;
}

.header-icons button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* ヘッダー分ずらす */
.section{
  display:none;
  padding-top:64px;
  height:calc(100vh - 64px);
}

.section.active{
  display:block;
}

.hamburger{
  background:none;
  border:none;
  outline:none;
  box-shadow:none;
  color:white;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}

.hamburger:focus,
.hamburger:active,
.hamburger:focus-visible{
  outline:none;
  box-shadow:none;
}

.hamburger .material-symbols-outlined{
  font-size:28px;
}
</style>
</head>

<body>

<!-- ===== ヘッダー ===== -->
<header class="main-header">

  <div class="header-top">

    <!-- ★ここが重要（完全一致） -->
    <div class="site-title">
      <a href="../index.html">
        <img src="../title-logo.png" alt="サイトタイトル">
      </a>
    </div>

    <!-- ハンバーガー -->
    <button class="hamburger" onclick="openModal()">
      <span class="material-symbols-outlined">menu</span>
    </button>

  </div>

</header>

<!-- ===== マップ ===== -->
<div id="map" class="section active">
  <iframe src="https://www.google.com/maps/d/embed?mid=1tuQ01_mcre6gl9iWlWT23rojln4oojU&ehbc=2E312F&noprof=1"
    style="width:100%; height:100%; border:none;">
  </iframe>
</div>

<!-- ===== 情報提供者一覧 ===== -->
<div id="contributors" class="section">
  <div class="content">
    <h2>情報提供者一覧</h2>
    <p>ここに名前などを載せる</p>
  </div>
</div>

<!-- ===== 使い方 ===== -->
<div id="howto" class="section">
  <div class="content">
    <h2>使い方</h2>
    <p>ここに説明を書く</p>
  </div>
</div>

<!-- ===== モーダル ===== -->
<div id="modal" class="modal" onclick="closeModal(event)">

  <div class="modal-content" onclick="event.stopPropagation()">

    <h3>メニュー</h3>

    <div class="menu-link" onclick="goHome()">ドズル社データベース</div>
    <div class="menu-link" onclick="showSection('map')">マップ</div>
    <div class="menu-link" onclick="showSection('contributors')">情報提供者一覧</div>
    <div class="menu-link" onclick="showSection('howto')">使い方</div>

  </div>

</div>

<script>
function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(e){
  if(!e || e.target.id === "modal"){
    document.getElementById("modal").classList.remove("active");
  }
}

// セクション切替
function showSection(id){

  document.querySelectorAll(".section").forEach(el=>{
    el.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  closeModal();
}

// ホームへ
function goHome(){
  location.href = "/";
}
</script>

</body>
</html>
