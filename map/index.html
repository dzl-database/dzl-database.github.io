<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ドズル社マップ</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
body{
  margin:0;
  font-family:sans-serif;
}

/* ===== ヘッダー ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.header img{
  height:40px;
}

.menu-btn{
  font-size:28px;
  cursor:pointer;
}

/* ===== セクション ===== */
.section{
  display:none;
  height:calc(100vh - 60px);
}

.section.active{
  display:block;
}

/* ===== マップ ===== */
.map iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ===== テキスト系 ===== */
.content{
  padding:20px;
}

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:#fff;
  border-radius:12px;
  padding:20px;
  width:280px;
  text-align:center;
}

.menu-link{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#f0f0f0;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== ヘッダー ===== -->
<header class="header">

  <a href="/">
    <img src="title-logo.png">
  </a>

  <span class="material-symbols-outlined menu-btn" onclick="openModal()">
    menu
  </span>

</header>

<!-- ===== マップ ===== -->
<div id="map" class="section active map">
  <iframe src="https://www.google.com/maps/d/embed?mid=1tuQ01_mcre6gl9iWlWT23rojln4oojU&ehbc=2E312F&noprof=1"></iframe>
</div>

<!-- ===== 情報提供者一覧 ===== -->
<div id="contributors" class="section">
  <div class="content">
    <h2>情報提供者一覧</h2>
    <p>ここに名前などを載せる</p>
  </div>
</div>

<!-- ===== 使い方 ===== -->
<div id="howto" class="section">
  <div class="content">
    <h2>使い方</h2>
    <p>ここに説明を書く</p>
  </div>
</div>

<!-- ===== モーダル ===== -->
<div id="modal" class="modal" onclick="closeModal(event)">

  <div class="modal-content" onclick="event.stopPropagation()">

    <h3>メニュー</h3>

    <div class="menu-link" onclick="goHome()">ドズル社データベース</div>
    <div class="menu-link" onclick="showSection('map')">マップ</div>
    <div class="menu-link" onclick="showSection('contributors')">情報提供者一覧</div>
    <div class="menu-link" onclick="showSection('howto')">使い方</div>

  </div>

</div>

<script>
function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(e){
  if(!e || e.target.id === "modal"){
    document.getElementById("modal").classList.remove("active");
  }
}

// セクション切替
function showSection(id){

  document.querySelectorAll(".section").forEach(el=>{
    el.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  closeModal();
}

// ホームへ
function goHome(){
  location.href = "/";
}
</script>

</body>
</html>
