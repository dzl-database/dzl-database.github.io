<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ドズル社マップ</title>

<!-- Google Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
body{
  margin:0;
  font-family: sans-serif;
  background:#f5f5f5;
}

/* ===== ヘッダー ===== */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}

.header-left img{
  height:40px;
}

.menu-btn{
  font-size:28px;
  cursor:pointer;
}

/* ===== マップ ===== */
.map-container{
  width:100%;
  height:calc(100vh - 60px);
}

.map-container iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ===== サイドメニュー（簡易） ===== */
.sidebar{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:200;
  padding:20px;
}

.sidebar.open{
  right:0;
}

.sidebar a{
  display:block;
  margin:12px 0;
  text-decoration:none;
  color:#333;
}
</style>
</head>

<body>

<!-- ===== ヘッダー ===== -->
<header class="header">

  <!-- 左：ロゴ -->
  <div class="header-left">
    <a href="/">
      <img src="/map-title-logo.png" alt="サイトタイトル">
    </a>
  </div>

  <!-- 右：ハンバーガー -->
  <span class="material-symbols-outlined menu-btn" onclick="toggleMenu()">
    menu
  </span>

</header>

<!-- ===== サイドバー ===== -->
<div id="sidebar" class="sidebar">
  <a href="/">ホームへ戻る</a>
  <a href="/map/">マップ</a>
</div>

<!-- ===== マップ ===== -->
<div class="map-container">

  <!-- ★ここにMy Map埋め込み -->
  <iframe src="https://www.google.com/maps/d/embed?mid=1tuQ01_mcre6gl9iWlWT23rojln4oojU&ehbc=2E312F&noprof=1" width="640" height="480"></iframe>

</div>

<script>
function toggleMenu(){
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("open");
}
</script>

</body>
</html>
